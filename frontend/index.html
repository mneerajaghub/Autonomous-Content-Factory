<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous Content Factory</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #eef2f7, #d9e4f5);
        }

        /* Fix scroll issue */
        body {
            display: block;
        }

        /* Main container */
        .container {
            max-width: 800px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        /* Heading */
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        /* Textarea */
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
            resize: none;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: #007BFF;
            outline: none;
        }

        /* Button */
        button {
            display: block;
            margin: 0 auto;
            background: linear-gradient(135deg, #007BFF, #0056b3);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }

        /* Output section */
        .output {
            margin-top: 30px;
        }

        /* Section cards */
        .output h3 {
            margin-top: 20px;
            color: #34495e;
        }

        .output p {
            background: #f8f9fb;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.6;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        /* Social media posts list */
        .output ul {
            padding: 0;
        }

        .output li {
            list-style: none;
            background: #f8f9fb;
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .output li:hover {
            transform: scale(1.02);
        }

        /* Fact sheet section */
        .fact-sheet {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fb;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .fact-sheet h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .fact-sheet p {
            background: #f8f9fb;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.6;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .fact-sheet ul {
            padding: 0;
        }

        .fact-sheet li {
            list-style: none;
            background: #f8f9fb;
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .fact-sheet li:hover {
            transform: scale(1.02);
        }

        /* Copy button styling */
        .copy-button {
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            height: auto;
            cursor: pointer;
            background: linear-gradient(135deg, #007BFF, #0056b3);
            color: white;
            border: none;
            transition: 0.3s;
        }

        .copy-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Autonomous Content Factory</h1>
        <textarea id="inputText" placeholder="Enter your text here..."></textarea>
        <button onclick="generateContent()">Generate</button>
        <div class="output" id="output">
            <!-- Results will be displayed here -->
        </div>
    </div>

    <div class="fact-sheet">
        <h2>Fact Sheet</h2>
        <div id="factSheetContent">
            <!-- Fact sheet content will be dynamically added here -->
        </div>
    </div>

    <script>
        async function generateContent() {
            const inputText = document.getElementById('inputText').value;
            const outputDiv = document.getElementById('output');
            const factSheetDiv = document.getElementById('factSheetContent');

            outputDiv.innerHTML = '<p>Loading...</p>';
            factSheetDiv.innerHTML = '<p>Loading fact sheet...</p>';

            try {
                const response = await fetch("http://127.0.0.1:8000/generate-full-content", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        text: inputText
                    })
                });

                const data = await response.json();
                console.log("API DATA:", data);

                const factSheet = data.fact_sheet || {};
                const features = factSheet.features || [];
                const targetAudience = factSheet.target_audience || "Not specified";
                const keyPoints = factSheet.key_points || [];

                factSheetDiv.innerHTML = `
                    <h3>Features:</h3>
                    <ul>
                        ${features.map(feature => `<li>${feature}</li>`).join('')}
                    </ul>
                    <h3>Target Audience:</h3>
                    <p>${targetAudience}</p>
                    <h3>Key Points:</h3>
                    <ul>
                        ${keyPoints.map(point => `<li>${point}</li>`).join('')}
                    </ul>
                `;

                const generatedContent = data.generated_content || {};
                const blog = generatedContent.blog || "No blog content available.";
                const socialMediaPosts = generatedContent.social_media_posts || [];
                const emailTeaser = generatedContent.email_teaser || "No email teaser available.";

                outputDiv.innerHTML = `
                    <h3>Blog:</h3>
                    <p contenteditable="true">${blog}</p>
                    <button class="copy-button" onclick="copyToClipboard('${blog}')">Copy Blog</button>
                    <h3>Social Media Posts:</h3>
                    <ul>
                        ${socialMediaPosts.map(post => `<li contenteditable="true">${post}</li>`).join('')}
                    </ul>
                    <button class="copy-button" onclick="copySocialPosts()">Copy Social Posts</button>
                    <h3>Email Teaser:</h3>
                    <p contenteditable="true">${emailTeaser}</p>
                    <button class="copy-button" onclick="copyToClipboard('${emailTeaser}')">Copy Email</button>
                `;
            } catch (error) {
                console.error("Error:", error);
                outputDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
                factSheetDiv.innerHTML = `<p style="color: red;">Error loading fact sheet.</p>`;
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied!");
            }).catch(err => {
                console.error("Failed to copy: ", err);
            });
        }

        function copySocialPosts() {
            const socialMediaPosts = document.querySelectorAll('.output ul li');
            const postsText = Array.from(socialMediaPosts).map(post => post.textContent).join('\n');
            navigator.clipboard.writeText(postsText).then(() => {
                alert("Social posts copied!");
            }).catch(err => {
                console.error("Failed to copy social posts: ", err);
            });
        }
    </script>
</body>
</html>
